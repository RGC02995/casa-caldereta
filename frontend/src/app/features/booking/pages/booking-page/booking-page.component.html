<booking-hero />

<section class="booking-main">
  <div class="booking-main__inner">
    <booking-calendar
      [bookedRanges]="bookedRanges()"
      [blockedPeriods]="blockedPeriods()"
      [checkIn]="checkIn()"
      [checkOut]="checkOut()"
      [loadError]="loadError()"
      (checkInChange)="checkIn.set($event)"
      (checkOutChange)="checkOut.set($event)"
    />
    <booking-request-panel
      [checkIn]="checkIn()"
      [checkOut]="checkOut()"
      [guests]="guests()"
      [priceEstimate]="priceEstimate()"
      (guestsChanged)="guests.set($event)"
      (conflictDetected)="onConflict()"
    />
  </div>
</section>
