<div class="admin-layout" [class.admin-layout--sidebar-open]="isSidebarOpen()">

  <aside class="admin-layout__sidebar" aria-label="Panel de navegación">

    <div class="admin-layout__brand">
      <span class="admin-layout__brand-name">Casa Caldereta</span>
      <span class="admin-layout__brand-sub">Administración</span>
    </div>

    <nav class="admin-layout__nav" aria-label="Navegación principal">
      <a
        class="admin-layout__nav-link"
        routerLink="/admin"
        routerLinkActive="admin-layout__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/reservas"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
        </svg>
        <span>Reservas</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/fotos"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <span>Fotos</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/rutas"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>Rutas</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/calendario"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="14" x2="8.01" y2="14"/>
          <line x1="12" y1="14" x2="12.01" y2="14"/>
          <line x1="16" y1="14" x2="16.01" y2="14"/>
        </svg>
        <span>Calendario</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/resenas"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Reseñas</span>
      </a>
      <a
        class="admin-layout__nav-link"
        routerLink="/admin/configuracion"
        routerLinkActive="admin-layout__nav-link--active"
        (click)="isSidebarOpen.set(false)"
      >
        <svg class="admin-layout__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Configuración</span>
      </a>
    </nav>

    <div class="admin-layout__sidebar-footer">
      @if (currentUser()) {
        <div class="admin-layout__user">
          <div class="admin-layout__user-avatar" aria-hidden="true">
            {{ currentUser()!.email.charAt(0).toUpperCase() }}
          </div>
          <span class="admin-layout__user-email">{{ currentUser()!.email }}</span>
        </div>
      }
      <button class="admin-layout__logout" type="button" (click)="logout()">
        <svg class="admin-layout__logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </button>
    </div>

  </aside>

  <div class="admin-layout__backdrop" (click)="isSidebarOpen.set(false)" aria-hidden="true"></div>

  <div class="admin-layout__body">
    <header class="admin-layout__topbar">
      <span class="admin-layout__topbar-brand">Casa Caldereta</span>
      <button
        class="admin-layout__menu-toggle"
        type="button"
        (click)="toggleSidebar()"
        [attr.aria-label]="isSidebarOpen() ? 'Cerrar menú' : 'Abrir menú'"
        [attr.aria-expanded]="isSidebarOpen() ? 'true' : 'false'"
      >
        @if (isSidebarOpen()) {
          <svg class="admin-layout__menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        } @else {
          <svg class="admin-layout__menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        }
      </button>
    </header>

    <main class="admin-layout__content">
      <router-outlet />
    </main>
  </div>

</div>
