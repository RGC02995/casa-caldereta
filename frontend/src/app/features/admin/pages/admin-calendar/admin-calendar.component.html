<div class="admin-calendar">

  <div class="admin-calendar__header">
    <h1 class="admin-calendar__title">Calendario y precios</h1>
  </div>

  @if (loadError()) {
    <p class="admin-calendar__load-error" role="alert">{{ loadError() }}</p>
  }

  <div class="admin-calendar__layout">

    <admin-calendar-view
      [calendarCells]="calendarCells()"
      [viewMonthLabel]="viewMonthLabel()"
      (prevMonth)="prevMonth()"
      (nextMonth)="nextMonth()"
    />

    <admin-calendar-panel
      [pricingRules]="pricingRules()"
      [blockedPeriods]="blockedPeriods()"
      (pricingChanged)="onPricingChanged()"
      (blockedChanged)="onBlockedChanged()"
    />

  </div>

</div>
