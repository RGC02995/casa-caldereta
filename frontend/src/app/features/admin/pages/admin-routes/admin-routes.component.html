<div class="admin-routes">

  <header class="admin-routes__header">
    <h1 class="admin-routes__title">Rutas y actividades</h1>
    @if (formMode() === 'hidden') {
      <button class="admin-routes__new-btn" type="button" (click)="openCreateForm()">
        + Nueva ruta
      </button>
    }
  </header>

  @if (actionError()) {
    <p class="admin-routes__action-error" role="alert">{{ actionError() }}</p>
  }

  @if (uploadFailures().length > 0) {
    <div class="admin-routes__upload-errors" role="alert">
      <p class="admin-routes__upload-errors-title">Imágenes no subidas:</p>
      <ul class="admin-routes__upload-errors-list">
        @for (failure of uploadFailures(); track failure) {
          <li class="admin-routes__upload-errors-item">{{ failure }}</li>
        }
      </ul>
    </div>
  }

  @if (formMode() !== 'hidden') {
    <admin-route-form
      #routeForm
      [mode]="formMode() === 'edit' ? 'edit' : 'create'"
      [initialRoute]="editingRoute()"
      [isSubmitting]="isSubmitting()"
      (formSubmit)="onFormSubmit($event)"
      (formCancel)="closeForm()"
      (galleryImageDelete)="onGalleryImageDelete($event)"
    />
  }

  <admin-route-list
    [routes]="sortedRoutes()"
    [processingId]="processingId()"
    [loadError]="loadError()"
    [isFormVisible]="formMode() !== 'hidden'"
    (editRoute)="openEditForm($event)"
    (togglePublished)="onTogglePublished($event)"
    (deleteRoute)="onDeleteRoute($event)"
  />

  <confirm-modal
    [isOpen]="pendingConfirm() !== null"
    [message]="pendingConfirm()?.message ?? ''"
    [danger]="true"
    (confirmed)="onConfirmModalConfirmed()"
    (cancelled)="onConfirmModalCancelled()"
  />

</div>
