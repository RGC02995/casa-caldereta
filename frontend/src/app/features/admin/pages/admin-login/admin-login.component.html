<div class="admin-login">

  <div class="admin-login__visual" aria-hidden="true">
    <div class="admin-login__visual-inner">
      <p class="admin-login__visual-name">Casa Caldereta</p>
      <p class="admin-login__visual-location">Aielo de Rugat · Valencia</p>
    </div>
  </div>

  <div class="admin-login__panel">
    <div class="admin-login__form-wrap">

      <div class="admin-login__header">
        <h1 class="admin-login__title">Bienvenido</h1>
        <p class="admin-login__subtitle">Accede al panel de administración</p>
      </div>

      <form class="admin-login__form" (submit)="onSubmit($event)" novalidate>

        <div class="admin-login__field">
          <label class="admin-login__label" for="email">Correo electrónico</label>
          <input
            class="admin-login__input"
            [class.admin-login__input--error]="!!emailError()"
            id="email"
            type="email"
            autocomplete="email"
            placeholder="admin@casacaldereta.es"
            [value]="emailValue()"
            (input)="emailValue.set($any($event.target).value)"
            (blur)="emailTouched.set(true)"
          />
          @if (emailError()) {
            <span class="admin-login__error" role="alert">{{ emailError() }}</span>
          }
        </div>

        <div class="admin-login__field">
          <label class="admin-login__label" for="password">Contraseña</label>
          <div class="admin-login__input-wrapper">
            <input
              class="admin-login__input admin-login__input--password"
              [class.admin-login__input--error]="!!passwordError()"
              id="password"
              [type]="passwordVisible() ? 'text' : 'password'"
              autocomplete="current-password"
              [value]="passwordValue()"
              (input)="passwordValue.set($any($event.target).value)"
              (blur)="passwordTouched.set(true)"
            />
            <button
              class="admin-login__password-toggle"
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="passwordVisible() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (passwordVisible()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          @if (passwordError()) {
            <span class="admin-login__error" role="alert">{{ passwordError() }}</span>
          }
        </div>

        @if (errorMessage()) {
          <div class="admin-login__alert" role="alert">
            {{ errorMessage() }}
          </div>
        }

        <button
          class="admin-login__submit"
          type="submit"
          [disabled]="isLoading()"
          [attr.aria-busy]="isLoading() || null"
        >
          @if (isLoading()) {
            <span class="admin-login__spinner" aria-hidden="true"></span>
            Entrando...
          } @else {
            Entrar
          }
        </button>

      </form>
    </div>
  </div>

</div>
