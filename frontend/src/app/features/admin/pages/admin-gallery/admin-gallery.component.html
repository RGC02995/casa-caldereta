<div class="admin-gallery">

  <header class="admin-gallery__header">
    <h1 class="admin-gallery__title">Fotos</h1>
  </header>

  <admin-gallery-upload (uploadCompleted)="onUploadCompleted()" />

  <admin-gallery-grid
    [photos]="filteredPhotos()"
    [processingId]="processingId()"
    [activeFilter]="activeFilter()"
    [loadError]="loadError()"
    [deleteError]="deleteError()"
    (filterChanged)="activeFilter.set($event)"
    (deleteRequested)="onDeleteRequested($event)"
  />

  <confirm-modal
    [isOpen]="pendingConfirm() !== null"
    [message]="pendingConfirm()?.message ?? ''"
    [danger]="true"
    (confirmed)="onConfirmModalConfirmed()"
    (cancelled)="onConfirmModalCancelled()"
  />

</div>
