<section class="home-map">
  <div class="home-map__inner">
    <div class="home-map__info" scrollReveal>
      <p class="home-map__label">Cómo llegar</p>
      <h2 class="home-map__title">Aielo de Rugat,<br>Valencia</h2>
      <dl class="home-map__distances">
        <div class="home-map__distance-item">
          <dt class="home-map__distance-label">Valencia ciudad</dt>
          <dd class="home-map__distance-value">65 km · ~55 min</dd>
        </div>
        <div class="home-map__distance-item">
          <dt class="home-map__distance-label">Xàtiva</dt>
          <dd class="home-map__distance-value">18 km · ~20 min</dd>
        </div>
        <div class="home-map__distance-item">
          <dt class="home-map__distance-label">Gandia (playa)</dt>
          <dd class="home-map__distance-value">40 km · ~35 min</dd>
        </div>
        <div class="home-map__distance-item">
          <dt class="home-map__distance-label">Alicante</dt>
          <dd class="home-map__distance-value">115 km · ~1h 15 min</dd>
        </div>
      </dl>
      <address class="home-map__address">
        Aielo de Rugat, Vall d'Albaida<br>
        Valencia, España
      </address>
    </div>
    <div class="home-map__embed" scrollReveal [revealFrom]="'right'" [delay]="100">
      <iframe
        class="home-map__iframe"
        title="Ubicación de Casa Caldereta en Aielo de Rugat, Valencia"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3126.5!2d-0.5186!3d38.8754!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd61795a9b3e9a7b%3A0x0!2sAielo+de+Rugat%2C+Valencia%2C+Spain!5e0!3m2!1ses!2ses!4v1"
        allowfullscreen
        aria-label="Mapa de Google Maps mostrando Aielo de Rugat, Valencia"
      ></iframe>
    </div>
  </div>
</section>
